name: Frontend CI/CD Workflow

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    env:
      NODE_ENV: production
      GENERATE_SOURCEMAP: false
      REACT_APP_VERSION: 1
      DISABLE_ESLINT_PLUGIN: true

    steps:
      # Kiểm tra code từ repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Cài đặt Node.js với cache để tăng tốc độ cài đặt
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Cài đặt phụ thuộc
      - name: Install Dependencies
        run: npm ci

      # Build dự án
      - name: Build Project
        run: npm run build --if-present

      # Chạy kiểm tra mã nếu cần
      - name: Run Tests
        run: |
          npm run test

      # Triển khai dự án lên GitHub Pages
      - name: Deploy with gh-pages
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}  # Token mặc định của GitHub Actions
        run: |
          git remote set-url origin https://git:${{ secrets.GIT_TOKEN }}@github.com/${{ github.repository }}.git
          npx gh-pages -d build -u "github-actions-bot <support+actions@github.com>"