name: Frontend CI/CD Workflow

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.0.0]

    env:
      NODE_ENV: production
      GENERATE_SOURCEMAP: false
      REACT_APP_VERSION: 1
      DISABLE_ESLINT_PLUGIN: true

    steps:
      # 1. Checkout code từ repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Cài đặt Node.js và cache npm
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # 3. Cài đặt dependencies mới nhất
      - name: Install Dependencies
        run: |
          npm i
          npm rebuild node-sass

      # 4. Build project
      - name: Build Project
        run: npm run build --if-present

      # 5. Chạy test (chỉ chạy lệnh echo để kiểm tra)
      - name: Run Tests (Echo)
        run: echo "Running Tests... ✅"

      # 6. Triển khai lên GitHub Pages
      - name: Deploy to GitHub Pages
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          GIT_REPOSITORY: ${{ github.repository }}

        run: |
          git remote set-url origin https://git:${GIT_TOKEN}@github.com/${github.repository}.git
          npx gh-pages -d build -u "github-actions-bot <support+actions@github.com>"
          env:
           GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}